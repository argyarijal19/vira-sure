<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Vira</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0f172a, #020617);
  color: white;
}

/* 🌌 ambient */
.bg-glow {
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,0,100,0.08), transparent 60%);
  animation: moveGlow 10s infinite alternate ease-in-out;
}

@keyframes moveGlow {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* ❤️ hearts */
.heart {
  position: absolute;
  color: #fb7185;
  opacity: 0.4;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* 🔐 lock */
.lock {
  position: fixed;
  width: 100%;
  height: 100%;
  background: inherit;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lock.fade {
  opacity: 0;
  pointer-events: none;
  transition: 1s;
}

.lock-box {
  background: rgba(255,255,255,0.06);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(16px);
  text-align: center;
}

/* input */
.lock-box input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
}

/* container */
.container {
  width: 100%;
  height: 100%;
  position: relative;
}

/* card */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 90%;
  max-width: 420px;
  padding: 30px;

  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  text-align: center;
}

/* image */
.hero-img {
  width: 220px;
  height: 220px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 20px;
}

/* text */
.text {
  min-height: 70px;
}

/* button */
button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #e11d48;
  color: white;
}

button:disabled {
  opacity: 0.5;
}

/* popup */
.popup {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
}

.popup.show {
  display: flex;
}

.popup-overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.popup-box {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 10px;
}

/* final */
.final {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<script>
for (let i = 0; i < 30; i++) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (5 + Math.random()*5)+"s";
  document.body.appendChild(h);
}
</script>

<!-- lock -->
<div id="lockScreen" class="lock">
  <div class="lock-box">
    <h2>Kalau ini memang kamu…</h2>
    <input type="password" id="keyInput">
    <button onclick="unlock()">Masuk</button>
  </div>
</div>

<!-- popup -->
<div id="errorPopup" class="popup">
  <div class="popup-overlay"></div>
  <div class="popup-box">
    <h3>Oops 😔</h3>
    <p>Bukan kamu orangnya</p>
    <button onclick="closePopup()">Coba lagi</button>
  </div>
</div>

<audio id="bgm" loop>
  <source src="./sound.mp3">
</audio>

<div class="container" id="container"></div>

<script>
const SECRET_KEY = "viracantikbanget";

function unlock(){
  const input = document.getElementById("keyInput").value.trim().toLowerCase();
  
  console.log("button klik", input)
  if(input === SECRET_KEY){
    document.getElementById("lockScreen").classList.add("fade");
    document.getElementById("bgm").play();
  } else {
    showPopup();
  }
}

function showPopup(){
  document.getElementById("errorPopup").classList.add("show");
}

function closePopup(){
  document.getElementById("errorPopup").classList.remove("show");
}

/* typing */
function typeText(el, text){
  let i=0;
  const interval=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },30);
}

/* story */
const steps = [
{
title: "Hai Vira Ainul Wahdah",
text: "Aku ga tau ini bakal cukup atau engga… tapi aku cuma pengen kamu denger aku sekali ini aja, pelan-pelan."
},
{
title: "Aku ngerti kamu",
text: "Kalau kamu takut… kalau kamu ragu… itu bukan hal yang salah, aku ngerti kok, dan itu wajar banget buat kamu, yang udah tau masa lalu aku gimana"
},
{
title: "Dan jujur",
text: "Kalau aku di posisi kamu, mungkin aku juga bakal ngerasa hal yang sama."
},
{
title: "Tentang aku",
text: "Aku udah ga akan nutupin masa lalu aku… atau nutupin apapun yang ada di dalam diri aku, karena itu emang ada."
},
{
title: "Tapi satu hal",
text: "Aku juga ga mau kamu kenal aku cuma dari versi lama aku, aku mau kamu kenal aku yang lebih baik dari sebelum aku kenal kamu"
},
{
title: "Aku sekarang",
text: "Aku udah capek jadi orang yang ga serius. Aku udah lewatin itu semua."
},
{
title: "Dan kamu",
text: "Dari semua yang pernah aku temuin… kamu yang paling bikin aku pengen berhenti, bukan dalam perbandingan apapun , tapi rasa yang aku rasain setelah aku kenal kamu, u gave me peace"
},
{
title: "Aku ga maksa",
text: "Aku ga butuh kamu langsung percaya. Aku cuma minta kesempatan buat buktiin, buktiin kalo kamu sama aku bakalan bahagia, dan kita bakalan selalu membahagiakan"
},
{
title: "Kalau kamu masih ragu",
text: "Gapapa… beneran gapapa. Aku bakalan terus ngeyakinin kamu denagan cara apapun, sampe kamu bener bener yakin banget sama aku"
},
{
title: "Karena jujur",
text: "Aku ga lagi cari banyak orang… aku cuma pengen satu orang yang aku jaga."
},
{
title: "",
text: "Dan orang itu… kamu.",
img: "https://iili.io/qWzDocG.jpg"
}
];

let index=0;

function showStep(){
  const container=document.getElementById("container");
  container.innerHTML="";

  if(index < steps.length){
    const step=steps[index];

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      ${step.img ? `<img src="${step.img}" class="hero-img">` : ""}
      <h2>${step.title}</h2>
      <div class="text"></div>
      <button id="btn" disabled>lanjut (10)</button>
    `;

    container.appendChild(card);

    typeText(card.querySelector(".text"), step.text);

    const btn=card.querySelector("#btn");
    let t=10;

    const timer=setInterval(()=>{
      t--;
      btn.innerText=`lanjut (${t})`;

      if(t===0){
        clearInterval(timer);
        btn.disabled=false;
        btn.innerText="lanjut";
        btn.onclick=next;
      }
    },1000);

    index++;
  } else {
   container.innerHTML = `<div class="final">I love you, more than i love my self \n stay with me yaaa sayaaangg kuu ❤️❤️❤️❤️❤️❤️</div>`;
  }
}

function next(){
  showStep();
}

showStep();
</script>

</body>
</html>
